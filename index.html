<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bora de Van | Passagem de Van e Transporte Rápido</title>
    <meta name="description" content="Agende sua passagem de van com a Bora de Van. Transporte rápido, seguro e confortável para São Paulo, Jabaquara, Santos, São Vicente, Litoral SP e Aeroporto de Guarulhos." />
    <meta name="keywords" content="van, passagem de van, transporte, lotação, viagem de van, van para jabaquara, van para santos, van são vicente, van litoral sp, van aeroporto guarulhos, bora de van, fretamento, passagem, viagem barata, carona compartilhada, alternativa carona" />
    <meta name="author" content="Bora de Van" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/png" href="/BDV.png" />
    
    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://boradevan.com.br/" />
    <meta property="og:title" content="Bora de Van | Passagem de Van e Transporte Rápido" />
    <meta property="og:description" content="Agende sua passagem de van com a Bora de Van. Transporte rápido, seguro e confortável para o Litoral SP e São Paulo." />
    
    <!-- Firebase Compat Scripts (Global Namespace) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  </head>
  <body>
    <script>
      const CURRENT_VERSION = '1.1.2';
      window.APP_VERSION = CURRENT_VERSION;

      if (sessionStorage.getItem('app_version') !== CURRENT_VERSION) {
          sessionStorage.removeItem('reloading_for_update');
          sessionStorage.setItem('app_version', CURRENT_VERSION);
      }

      const originalFetch = window.fetch;
      window.fetch = async function() {
        let args = arguments;
        let url = args[0];
        if (typeof url === 'string' && (url.startsWith('/api/') || url === '/version')) {
          let init = args[1] || {};
          init.headers = init.headers || {};
          if (init.headers instanceof Headers) {
            init.headers.set('x-app-version', CURRENT_VERSION);
          } else if (Array.isArray(init.headers)) {
            init.headers.push(['x-app-version', CURRENT_VERSION]);
          } else {
            init.headers['x-app-version'] = CURRENT_VERSION;
          }
          args[1] = init;
          try {
            const resp = await originalFetch.apply(this, args);
            if (resp.status === 426) {
                triggerUpdate();
            }
            return resp;
          } catch (err) { throw err; }
        }
        return originalFetch.apply(this, args);
      };

      function triggerUpdate() {
          if (!sessionStorage.getItem('reloading_for_update')) {
              sessionStorage.setItem('reloading_for_update', 'true');
              
              const loader = document.createElement('div');
              loader.style.position = 'fixed';
              loader.style.top = '0';
              loader.style.left = '0';
              loader.style.width = '100vw';
              loader.style.height = '100vh';
              loader.style.backgroundColor = 'rgba(15, 23, 42, 0.9)';
              loader.style.color = '#fff';
              loader.style.display = 'flex';
              loader.style.flexDirection = 'column';
              loader.style.alignItems = 'center';
              loader.style.justifyContent = 'center';
              loader.style.zIndex = '999999';
              loader.innerHTML = '<div style="border:4px solid rgba(255,255,255,0.1); border-top:4px solid #3b82f6; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite;"></div><p style="margin-top:20px; font-family:sans-serif; font-weight:bold;">Aplicando atualização...</p><style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>';
              document.body.appendChild(loader);

              function tryReload() {
                  originalFetch('/version?t=' + new Date().getTime())
                    .then(r => {
                        if (r.ok) {
                            window.location.reload(true);
                        } else {
                            setTimeout(tryReload, 1500);
                        }
                    })
                    .catch(() => setTimeout(tryReload, 1500));
              }
              setTimeout(tryReload, 1500);
          } else {
              console.error('Update loop detected. Please clear cache.');
          }
      }

      function checkAppVersion() {
          originalFetch('/version?t=' + new Date().getTime(), { headers: { 'x-app-version': CURRENT_VERSION } })
            .then(res => res.json())
            .then(data => { 
                if (data.version && data.version !== CURRENT_VERSION) {
                    triggerUpdate();
                }
            })
            .catch(console.error);
      }

      // Check on initial load
      checkAppVersion();

      // Check every 5 minutes
      setInterval(checkAppVersion, 300000);

      // Check when user comes back to the tab
      document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
              checkAppVersion();
          }
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
