
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bora de Van</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/BDV.png" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTML2Canvas (Para Prints) -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <!-- Firebase Compat Scripts (Global Namespace) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100dvh;
            background-color: #0f172a; color: #ffffff;
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
            position: fixed; inset: 0; overflow: hidden;
        }

        #root { width: 100%; height: 100%; display: flex; flex-direction: column; }

        #loader {
            position: fixed;
            inset: 0;
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0"
  }
}
</script>
<link rel="stylesheet" href="./index.css">
</head>
<body>
    <div id="loader"><div class="spinner"></div><p style="margin-top:20px; color:#94a3b8; font-size:12px; font-weight:bold;">Bora de Van</p></div>
    <div id="root"></div>
    <script>
      const CURRENT_VERSION = '1.1.12';
      window.APP_VERSION = CURRENT_VERSION;
      
      const urlParams = new URLSearchParams(window.location.search);
      // Trava de segurança: Se acabamos de recarregar para esta versão, marcamos o momento
      if (urlParams.has('_v')) {
          if (urlParams.get('_v') === CURRENT_VERSION) {
              sessionStorage.setItem('last_success_reload', Date.now());
              urlParams.delete('_v');
              const newUrl = window.location.pathname + (urlParams.toString() ? '?' + urlParams.toString() : '');
              window.history.replaceState({}, '', newUrl);
          }
          sessionStorage.removeItem('reloading_for_update');
      }

      if (sessionStorage.getItem('app_version') !== CURRENT_VERSION) {
          sessionStorage.removeItem('reloading_for_update');
          sessionStorage.setItem('app_version', CURRENT_VERSION);
      }

      const originalFetch = window.fetch;
      window.fetch = async function() {
        let args = arguments;
        let url = args[0];
        if (typeof url === 'string' && url.startsWith('/api/')) {
          let init = args[1] || {};
          init.headers = init.headers || {};
          if (init.headers instanceof Headers) {
            init.headers.set('x-app-version', CURRENT_VERSION);
          } else if (Array.isArray(init.headers)) {
            init.headers.push(['x-app-version', CURRENT_VERSION]);
          } else {
            init.headers['x-app-version'] = CURRENT_VERSION;
          }
          args[1] = init;
          try {
            const resp = await originalFetch.apply(this, args);
            if (resp.status === 426) {
                triggerUpdate();
            }
            return resp;
          } catch (err) { throw err; }
        }
        return originalFetch.apply(this, args);
      };

      function triggerUpdate(latestVersion) {
          // Só permite atualizar se não houver um reload em andamento E se não recarregamos nos últimos 30 segundos para a mesma versão
          const lastReloadTime = parseInt(sessionStorage.getItem('last_success_reload') || '0');
          const isRecentlyReloaded = (Date.now() - lastReloadTime) < 30000;

          if (isRecentlyReloaded) {
              console.log('Update ignorado: Recarregamento recente detectado.');
              return;
          }

          if (!sessionStorage.getItem('reloading_for_update') || sessionStorage.getItem('reloading_for_update') !== latestVersion) {
              sessionStorage.setItem('reloading_for_update', latestVersion || 'true');
              
              const loader = document.createElement('div');
              loader.style.position = 'fixed';
              loader.style.top = '0';
              loader.style.left = '0';
              loader.style.width = '100vw';
              loader.style.height = '100vh';
              loader.style.backgroundColor = 'rgba(15, 23, 42, 0.9)';
              loader.style.color = '#fff';
              loader.style.display = 'flex';
              loader.style.flexDirection = 'column';
              loader.style.alignItems = 'center';
              loader.style.justifyContent = 'center';
              loader.style.zIndex = '999999';
              loader.innerHTML = '<div style="border:4px solid rgba(255,255,255,0.1); border-top:4px solid #3b82f6; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite;"></div><p style="margin-top:20px; font-family:sans-serif; font-weight:bold;">Aplicando atualização...</p><style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>';
              document.body.appendChild(loader);

              setTimeout(() => {
                  const url = new URL(window.location.href);
                  url.searchParams.set('_v', latestVersion || new Date().getTime());
                  window.location.replace(url.toString());
              }, 1500);
          } else {
              console.error('Update loop detected. Please clear cache.');
          }
      }

      function isNewerVersion(oldVer, newVer) {
          const oldParts = oldVer.split('.').map(Number);
          const newParts = newVer.split('.').map(Number);
          for (let i = 0; i < Math.max(oldParts.length, newParts.length); i++) {
              const o = oldParts[i] || 0;
              const n = newParts[i] || 0;
              if (n > o) return true;
              if (n < o) return false;
          }
          return false;
      }

      window.checkAppVersion = function() {
          // Evita checagens excessivas (máximo 1 a cada 5 segundos)
          const now = Date.now();
          if (window._lastVersionCheck && (now - window._lastVersionCheck < 5000)) return;
          window._lastVersionCheck = now;

          originalFetch('/?_t=' + now, { 
              cache: 'no-store',
              headers: {
                  'Cache-Control': 'no-cache, no-store, must-revalidate',
                  'Pragma': 'no-cache',
                  'Expires': '0'
              }
          })
            .then(res => res.text())
            .then(text => { 
                const match = text.match(/const CURRENT_VERSION\s*=\s*['"]([^'"]+)['"]/);
                if (match && match[1]) {
                    const latestVersion = match[1];
                    if (CURRENT_VERSION && latestVersion !== CURRENT_VERSION) {
                        if (isNewerVersion(CURRENT_VERSION, latestVersion)) {
                            triggerUpdate(latestVersion);
                        } else {
                            console.log('Ignorando versão mais antiga do servidor:', latestVersion);
                        }
                    }
                }
            })
            .catch(console.error);
      };

      // Removido check automático no load para evitar loops
      // window.checkAppVersion();
    </script>
    <script type="module" src="./index.tsx"></script>
    <script>
        window.addEventListener('load', () => {
            const l = document.getElementById('loader');
            if (l) {
                l.style.opacity = '0';
                setTimeout(() => l.remove(), 500);
            }
        });
        // Fallback if load event doesn't fire
        setTimeout(() => {
            const l = document.getElementById('loader');
            if (l) {
                l.style.opacity = '0';
                setTimeout(() => l.remove(), 500);
            }
        }, 4000);
    </script>
</body>
</html>
